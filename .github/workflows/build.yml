name: Build executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: trade-alert-windows.exe
            bin: dist/trade-alert.exe
          - os: macos-latest
            artifact: trade-alert-macos
            bin: dist/trade-alert
          - os: ubuntu-latest
            artifact: trade-alert-linux
            bin: dist/trade-alert

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: python -m PyInstaller trade_alert.spec

      - name: Rename binary
        shell: bash
        run: mv ${{ matrix.bin }} dist/${{ matrix.artifact }}

      - name: Mark executable (non-Windows)
        if: runner.os != 'Windows'
        run: chmod +x dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
